name: SBOM

# ============================================================================
# Software Bill of Materials (SBOM)
# ============================================================================
# Generates CycloneDX SBOMs for the Node.js dependency graph and the Go
# module graph and uploads them as build artifacts. Useful for license/
# vulnerability auditing downstream.
# ============================================================================

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-sbom:
    name: Node.js SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        run: pnpm dlx @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom-node.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v5
        with:
          name: sbom-node
          path: sbom-node.json
          retention-days: 90

  go-sbom:
    name: Go SBOM (CycloneDX)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: src-go/go.mod
          cache: true
          cache-dependency-path: src-go/go.sum

      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate CycloneDX SBOM
        run: cyclonedx-gomod mod -licenses -json -output sbom-go.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v5
        with:
          name: sbom-go
          path: src-go/sbom-go.json
          retention-days: 90
