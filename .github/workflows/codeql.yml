name: CodeQL

# ============================================================================
# CodeQL Static Analysis
# ============================================================================
# Scans JavaScript / TypeScript and Go source for vulnerabilities. Findings
# show up under the Security tab → Code scanning. Free for public repos and
# included with GitHub Advanced Security on private repos.
# ============================================================================

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master]
  schedule:
    # Weekly Monday morning sweep so newly published rules catch latent issues.
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: autobuild

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: src-go/go.mod
          cache: true
          cache-dependency-path: src-go/go.sum

      - name: Build Go (autobuild)
        if: matrix.language == 'go'
        working-directory: src-go
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
